spec_version: 1

name: packet-scheduling-env
description: >
  A network packet scheduling environment where an agent allocates bandwidth
  between priority and regular traffic to minimize congestion.

type: space
runtime: fastapi
app: server.app:main
port: 8000

tasks:
  - name: easy
    description: Low traffic, predictable arrivals
    max_steps: 50

  - name: moderate
    description: Moderate traffic with bursty arrivals
    max_steps: 50

  - name: hard
    description: High congestion with heavy bursts
    max_steps: 50

observation_space:
  type: object
  properties:
    q_priority:
      type: number
    q_regular:
      type: number
    incoming:
      type: number
    step:
      type: integer
    p_lost:
      type: integer
    r_lost:
      type: integer
    loss_rate:
      type: number
    avg_latency:
      type: number
    throughput:
      type: number
    fairness_index:
      type: number

action_space:
  type: object
  properties:
    priority_ratio:
      type: number
      minimum: 0.0
      maximum: 1.0
  required: ["priority_ratio"]

reward:
  description: >
    Multi-objective reward balancing loss, latency, throughput, and fairness.
    Penalizes congestion, instability, and unfair allocation.

grader:
  type: external
  endpoint: /grader
